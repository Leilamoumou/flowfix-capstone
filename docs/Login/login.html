    <main>
      <section class="login-section">
        <div class="container">

          <h2 id="form-title">Login</h2>
          <!-- Status messages:-->
            <p id="message" style="display:none; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem;"></p>

          <form id="auth-form">
            <label>Email</label>
            <input type="email" id="email" placeholder="Email" required>
            <label>Password</label>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn" id="submit-btn">Login</button>
          </form>

    <!-- Sign up & Login toggles: -->
     <p style="text-align:center; margin-top: 16px; font-size: 0.9rem; color: #555;">
            <span id="switch-label">New to FlowFix?</span>
            <button id="switch-btn" style="background:none; border:none; color:#f97316; font-weight:bold; cursor:pointer; font-size:0.9rem;">Sign up</button>
          </p>

        </div>
      </section>

     <script src="../script.js"></script>
<!-- Firebase Authentication ** adjusted script-->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword
      } 
      from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

      //config
       const firebaseConfig = {
    apiKey: process.env.EXPO_PUBLIC_API_KEY,
    authDomain: process.env.EXPO_PUBLIC_AUTH_DOMAIN,
   projectId: process.env.EXPO_PUBLIC_PROJECT_ID,
    appId: process.env.EXPO_PUBLIC_APP_ID
      };
//DOM btn refs
      const form        = document.getElementById("auth-form");
      const submitBtn   = document.getElementById("submit-btn");
      const switchBtn   = document.getElementById("switch-btn");
      const formTitle   = document.getElementById("form-title");
      const switchLabel = document.getElementById("switch-label");
      const messageEl   = document.getElementById("message");
    // login toggle functionality
     switchBtn.addEventListener("click", () => {

        isSignUp = !isSignUp;
        
        formTitle.textContent   = isSignUp ? "Create Account" : "Login";
        submitBtn.textContent   = isSignUp ? "Sign Up" : "Login";
        switchLabel.textContent = isSignUp ? "Already a member?" : "New to FlowFix?";
        switchBtn.textContent   = isSignUp ? "Log in" : "Sign up";
        clearMessage();
      });

      //form submit functionality
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMessage();

        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        //account creation & login check + error handling :
 try {
          if (isSignUp) {
            await createUserWithEmailAndPassword(auth, email, password);
            showMessage("Account creation successful.", "success");
          } else {
            await signInWithEmailAndPassword(auth, email, password);
            showMessage("Login successful.", "success");
            setTimeout(() => { window.location.href = "../index.html"; }, 1000);
          }
        } catch (error) {
          
          showMessage(friendlyError(error.code), "error");
        }
      });
       function showMessage(msg, type) {
        messageEl.textContent = msg;
        messageEl.style.display = "block";
        messageEl.style.background = type === "error" ? "#fde8e8" : "#e8f5e9";
        messageEl.style.color      = type === "error" ? "#b91c1c" : "#1b5e20";
      }

      function clearMessage() {
        messageEl.textContent = "";
        messageEl.style.display = "none";
      }
      // Error handling, where account creation credentials are managed & invalid credientals are encountered for login
       function friendlyError(code) {
        const errors = {
          "auth/invalid-email":        "Invalid email.",
          "auth/user-not-found":       "No account found associated with this email.",
          //TODO: need to handle login attempts more efficiently for security measures. @Leilamoumou
          "auth/wrong-password":       "Incorrect password.",
          "auth/email-already-in-use": "An account with this email already exists.",
          //stricter reqs, to ensure more unique passwords
          "auth/weak-password":        "Password should be at least 6 characters.",
          "auth/invalid-credential":   "Invalid email or password.",
          "auth/too-many-requests":    "Too many attempts.",
        };
        return errors[code] || "An error occured. Try again.";
      }
    </script>

  </body>
