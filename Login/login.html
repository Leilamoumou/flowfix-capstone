  <body>
    <!-- Nav -->
    <header class="main-header">
      <div class="container">
        <div class="nav-wrapper">
          <div class="logo">
            <h1>FlowFix</h1>

          <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span>

          </button>
          <nav class="main-nav">

    <!-- Login CARD structure:-->
      <section class="login-section">
      <div class="login-card">
        <h2 id="form-title">Login</h2>
        <p class="login-subtitle" id="form-subtitle">Welcome back!</p>

        <div class="login-message" id="message"></div>

        <form id="auth-form">
          <label for="email">Email</label>
<input type="email" id="email" autocomplete="email" placeholder="you@example.com" required />


          <label for="password">Password</label>
<input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required />

          <!-- Remember me + Forgot password row -->
          <div class="login-extras" id="extras-row">
            <label>
              <input type="checkbox" id="remember-me"> Remember me
            </label>
            <a href="#" id="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-primary" id="submit-btn">Log in</button>
        </form>

        <p class="login-switch">
          <span id="switch-label">New to FlowFix?</span>
          <button id="switch-btn">Sign up</button>
        </p>
      </div>
    </section>

     <script src="../script.js"></script>
<!-- Firebase Authentication ** adjusted script-->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        sendPasswordResetEmail 
      } 
      from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

      //config
       const firebaseConfig = {
     apiKey:     "",
    authDomain: "",
    projectId: "flowfix-65fd1",
   appId: "1:878384279716:web:041715c6ae2aa120b23631",      };
    const app  = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      let isSignUp = false;


//DOM btn refs
    const form        = document.getElementById("auth-form");
      const submitBtn   = document.getElementById("submit-btn");
      const switchBtn   = document.getElementById("switch-btn");
      const formTitle   = document.getElementById("form-title");
      const formSub     = document.getElementById("form-subtitle");
      const switchLabel = document.getElementById("switch-label");
      const messageEl   = document.getElementById("message");
      //additional functions
      const extrasRow   = document.getElementById("extras-row");
      const forgotLink  = document.getElementById("forgot-link");
    // login toggle functionality
     switchBtn.addEventListener("click", () => {

        isSignUp = !isSignUp;
        
        formTitle.textContent   = isSignUp ? "Create Account" : "Login";
        formSub.textContent     = isSignUp ? "Join us today!" : "Welcome back!";
        submitBtn.textContent   = isSignUp ? "Sign Up" : "Log in";
        switchLabel.textContent = isSignUp ? "Already a member?" : "New to FlowFix?";
        switchBtn.textContent   = isSignUp ? "Log in" : "Sign up";
        // hide remember me option &  forgot password upon sign up site, only show on login
         extrasRow.style.display = isSignUp ? "none" : "flex";
        clearMessage();
      });
      //forgot password functionality for account access recovery
forgotLink.addEventListener("click", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        if (!email) {
          showMessage("Enter your email before selecting Forgot Password.", "error");
          return;
        }
        try {
          await sendPasswordResetEmail(auth, email);
          showMessage("Password reset email sent, check your inbox for further instructions.", "success");
        } catch (error) {
          showMessage(friendlyError(error.code), "error");
        }
      });
      //form submit functionality 
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMessage();

        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        //account creation & login check + error handling :
 try {
          if (isSignUp) {
            await createUserWithEmailAndPassword(auth, email, password);
            showMessage("Account creation successful.", "success");
          } else {
            await signInWithEmailAndPassword(auth, email, password);
            showMessage("Login successful.", "success");
            setTimeout(() => { window.location.href = "../index.html"; }, 1000);
          }
        } catch (error) {
          
          showMessage(friendlyError(error.code), "error");
        }
      });


  
    function showMessage(msg, type) {
        messageEl.textContent = msg;
        messageEl.className = `login-message ${type}`;
      }
      function clearMessage() {
        messageEl.textContent = "";
        messageEl.className = "login-message";
      }
      // Error handling, where account creation credentials are managed & invalid credientals are encountered for login
       function friendlyError(code) {
        const errors = {
          "auth/invalid-email":        "Invalid email.",
          "auth/user-not-found":       "No account found associated with this email.",
          //TODO: need to handle login attempts more efficiently for security measures. @Leilamoumou
          "auth/wrong-password":       "Incorrect password.",
          "auth/email-already-in-use": "An account with this email already exists.",
          //stricter reqs, to ensure more unique passwords
          "auth/weak-password":        "Password should be at least 6 characters.",
          "auth/invalid-credential":   "Invalid email or password.",
          "auth/too-many-requests":    "Too many attempts.",
        };
        return errors[code] || "An error occured. Please try again.";
      }
    </script>

  </body>
</html>
