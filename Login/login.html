    <link rel="stylesheet" href="../styles.css">
  </head>

  <body>
    <!-- Navigation Header -->
    <header class="main-header">
      <div class="container">
        <div class="nav-wrapper">
          <div class="logo">
            <h1>FlowFix</h1>
          </div>
          <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <nav class="main-nav">
            <a href="login.html" class="btn">Login</a>
            <a href="../GEN-Maintenance-Check/Maintenance.html">General Maintenance Check</a>
            <a href="../Pricing/pricing.html">Pricing</a>

            <a href="#Emergency-Plumbing" class="btn btn-emergency">Emergency Help</a>

              <img src="../dark-mode.png" id="themeIcon" alt="Dark Mode Icon" width="30" height="30">
            </button>
          </nav>
        </div>
      </div>
    </header>

    <main>
      <section class="login-section">
        <div class="container">
          <h2>Login</h2>
         <form action="" method="POST">
  <label>Email</label>
  <input type="email" placeholder="Email" required>
  <label>Password</label>
  <input type="password" placeholder="Password" required>
  <button type="submit" class="btn">Login</button>
</form>
        </div>
      </section>
    </main>

    <script src="../script.js"></script>
    <!-- Firebase script for login AUTH-->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
      import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';


      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.querySelector('input[type="email"]').value;
        const password = document.querySelector('input[type="password"]').value;

        try {
          await signInWithEmailAndPassword(auth, email, password);
          alert('Login sucessful.');
          window.location.href = '../index.html';
        } catch (error) {
          alert(error.message);
        }
      });
    </script>
  </body>
</html>
